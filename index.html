<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tostadores Argentinos | Selección Boutique</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <style>
        :root { --bg: #FDFCFB; --text: #2D2421; --accent: #6F4E37; --border: #E8E2DF; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; }
        header { padding: 50px 20px; text-align: center; border-bottom: 1px solid var(--border); background: white; }
        h1 { font-size: 2rem; font-weight: 800; margin: 0; letter-spacing: -1px; }
        .subtitle { font-size: 0.9rem; color: var(--accent); margin-top: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 40px; }
        select, input { background: white; border: 1px solid var(--border); padding: 14px; border-radius: 12px; font-family: inherit; outline: none; }
        .grid-tostadores { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .card { background: white; border: 1px solid var(--border); border-radius: 20px; padding: 30px; box-shadow: 0 5px 15px rgba(0,0,0,0.02); display: flex; flex-direction: column; transition: all 0.2s; }
        .card:hover { transform: translateY(-3px); border-color: var(--accent); }
        .brand-name { font-size: 1.4rem; font-weight: 800; margin: 0; color: var(--text); }
        .location { font-size: 0.85rem; color: var(--accent); font-weight: 700; margin: 5px 0 25px; text-transform: uppercase; letter-spacing: 1px; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: auto; }
        .btn { text-decoration: none; font-size: 0.8rem; font-weight: 700; color: white; text-align: center; padding: 14px; border-radius: 10px; text-transform: uppercase; }
        .btn-ig { background: #475569; }
        .btn-shop { background: var(--accent); }
        .btn:hover { filter: brightness(1.2); }
        @media (max-width: 600px) { .controls { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <h1>Tostadores Argentinos</h1>
    <p class="subtitle" id="contador">Actualizando Colección...</p>
</header>

<div class="container">
    <div class="controls">
        <select id="select-ciudad" onchange="filtrar()"><option value="Todas">Todas las ciudades</option></select>
        <input type="text" id="buscador" placeholder="Buscar marca..." onkeyup="filtrar()">
    </div>
    <div id="resultados-grid" class="grid-tostadores"></div>
</div>

<script>
    const SHEET_ID = "10vUOhRr7IAXlRrkBphxEP4ApXYBgrnuxJq6G83GnfHI";
    const GID = "1590442133";
    const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${GID}&v=${new Date().getTime()}`;

    let tostadores = [];

    async function cargar() {
        Papa.parse(URL, {
            download: true, header: true,
            complete: (results) => {
                // PROCESAMIENTO DE DATOS SEGURO
                tostadores = results.data.filter(row => row.TOSTADOR || row.Tostador).map(row => {
                    let obj = {};
                    // Normalizamos las llaves para que no importe la barra "/" o los espacios
                    for (let key in row) {
                        let cleanKey = key.trim().toUpperCase().replace('/', '_');
                        obj[cleanKey] = row[key].trim();
                    }
                    return obj;
                });
                
                armarMenu();
                render(tostadores);
                document.getElementById('contador').innerText = `${tostadores.length} Marcas Curadas`;
            }
        });
    }

    function armarMenu() {
        const select = document.getElementById('select-ciudad');
        const ciudades = [...new Set(tostadores.map(t => t.UBICACION || t.CIUDAD || 'Argentina'))].sort();
        ciudades.forEach(ciu => {
            const cant = tostadores.filter(t => (t.UBICACION || t.CIUDAD || 'Argentina') === ciu).length;
            const opt = document.createElement('option');
            opt.value = ciu; opt.textContent = `${ciu} (${cant})`;
            select.appendChild(opt);
        });
    }

    function render(lista) {
        const grid = document.getElementById('resultados-grid');
        grid.innerHTML = "";
        lista.forEach(t => {
            const card = document.createElement('div');
            card.className = 'card';
            
            // BUSQUEDA FLEXIBLE DEL LINK DE TIENDA
            // El reemplazo de "/" por "_" hace que busquemos WEB_TIENDA
            const linkTienda = t.WEB_TIENDA || t.WEB || t.TIENDA || t.URL || "";
            const linkIg = t.INSTAGRAM || "";

            card.innerHTML = `
                <div class="location">📍 ${t.UBICACION || t.CIUDAD || 'Argentina'}</div>
                <h3 class="brand-name">${t.TOSTADOR}</h3>
                <div style="height:25px"></div>
                <div class="btn-group">
                    <a href="${linkIg}" target="_blank" class="btn btn-ig" ${linkIg ? '' : 'style="display:none"'}>Instagram</a>
                    <a href="${linkTienda}" target="_blank" class="btn btn-shop" ${linkTienda ? '' : 'style="display:none"'}>Tienda</a>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function filtrar() {
        const ciu = document.getElementById('select-ciudad').value;
        const bus = document.getElementById('buscador').value.toLowerCase();
        const filtrados = tostadores.filter(t => {
            const ubi = t.UBICACION || t.CIUDAD || 'Argentina';
            return (ciu === "Todas" || ubi === ciu) && t.TOSTADOR.toLowerCase().includes(bus);
        });
        render(filtrados);
    }

    cargar();
</script>
</body>
</html>
