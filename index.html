<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tostadores | Directorio Premium</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <style>
        :root {
            --bg: #FCFBFA; /* Blanco hueso */
            --text: #1A1A1A;
            --text-light: #666666;
            --border: #E5E5E5;
            --accent: #5D4037;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        header {
            padding: 80px 20px 40px;
            text-align: center;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin: 0;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-light);
            margin-top: 10px;
            letter-spacing: 1px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto 100px;
            padding: 0 20px;
        }

        /* FILTROS MINIMALISTAS */
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 50px;
        }

        select, input {
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            padding: 12px 5px;
            font-family: inherit;
            font-size: 0.95rem;
            color: var(--text);
            outline: none;
            transition: border-color 0.3s;
        }

        select:focus, input:focus {
            border-color: var(--text);
        }

        /* GALERÍA DE TOSTADORES */
        .grid-tostadores {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 40px;
        }

        .card {
            border-top: 1px solid var(--border);
            padding-top: 25px;
            display: flex;
            flex-direction: column;
            transition: opacity 0.3s;
        }

        .brand-name {
            font-size: 1.2rem;
            font-weight: 600;
            margin: 0;
            letter-spacing: -0.2px;
        }

        .location {
            font-size: 0.8rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 8px 0 25px;
        }

        .btn-group {
            display: flex;
            gap: 20px;
        }

        .btn {
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text);
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.2s;
            position: relative;
        }

        .btn::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: -2px;
            left: 0;
            background-color: var(--text);
            transition: width 0.3s;
        }

        .btn:hover::after {
            width: 100%;
        }

        #loading {
            text-align: center;
            font-size: 0.8rem;
            letter-spacing: 2px;
            margin-top: 50px;
            color: var(--text-light);
        }

        @media (max-width: 600px) {
            .controls { grid-template-columns: 1fr; }
            header { padding: 50px 20px 30px; }
        }
    </style>
</head>
<body>

<header>
    <h1>Tostadores <span>Argentinos</span></h1>
    <p class="subtitle" id="contador">Cargando colección...</p>
</header>

<div class="container">
    <div class="controls">
        <select id="select-ciudad" onchange="filtrar()">
            <option value="Todas">Todas las ciudades</option>
        </select>
        <input type="text" id="buscador" placeholder="Buscar marca..." onkeyup="filtrar()">
    </div>

    <div id="loading">Sincronizando...</div>
    <div class="grid-tostadores" id="grid"></div>
</div>

<script>
    const SHEET_ID = "10vUOhRr7IAXlRrkBphxEP4ApXYBgrnuxJq6G83GnfHI";
    const GID = "1590442133";
    const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${GID}&nocache=${new Date().getTime()}`;

    let tostadores = [];

    async function cargarDatos() {
        Papa.parse(URL, {
            download: true,
            header: true,
            complete: (results) => {
                tostadores = results.data.filter(f => f.TOSTADOR);
                document.getElementById('loading').style.display = 'none';
                armarSelector();
                renderizar(tostadores);
                document.getElementById('contador').innerText = `${tostadores.length} Marcas Curadas`;
            }
        });
    }

    function armarSelector() {
        const select = document.getElementById('select-ciudad');
        const ciudades = [...new Set(tostadores.map(t => t.UBICACION || 'Argentina'))].sort();
        
        ciudades.forEach(ciu => {
            const cant = tostadores.filter(t => (t.UBICACION || 'Argentina') === ciu).length;
            const option = document.createElement('option');
            option.value = ciu;
            option.textContent = `${ciu} (${cant})`;
            select.appendChild(option);
        });
    }

    function renderizar(lista) {
        const grid = document.getElementById('grid');
        grid.innerHTML = "";

        lista.forEach(t => {
            const card = document.createElement('div');
            card.className = 'card';
            
            const linkIg = t.INSTAGRAM || "#";
            const linkShop = t.WEB || t['WEB/TIENDA'] || "#";

            card.innerHTML = `
                <h3 class="brand-name">${t.TOSTADOR}</h3>
                <div class="location">${t.UBICACION || 'Argentina'}</div>
                <div class="btn-group">
                    <a href="${linkIg}" target="_blank" class="btn">Instagram</a>
                    <a href="${linkShop}" target="_blank" class="btn">Tienda Online</a>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function filtrar() {
        const ciudad = document.getElementById('select-ciudad').value;
        const busqueda = document.getElementById('buscador').value.toLowerCase();

        const filtrados = tostadores.filter(t => {
            const ubi = t.UBICACION || 'Argentina';
            const coincideCiudad = (ciudad === "Todas") || (ubi === ciudad);
            const coincideBusqueda = t.TOSTADOR.toLowerCase().includes(busqueda);
            return coincideCiudad && coincideBusqueda;
        });

        renderizar(filtrados);
    }

    cargarDatos();
</script>

</body>
</html>
