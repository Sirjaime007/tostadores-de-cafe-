<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tostadores Argentinos | Selección Boutique</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <style>
        :root { --bg: #FDFCFB; --text: #2D2421; --accent: #6F4E37; --border: #E8E2DF; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; }
        header { padding: 40px 20px; text-align: center; border-bottom: 1px solid var(--border); background: white; }
        h1 { font-size: 1.8rem; font-weight: 800; margin: 0; letter-spacing: -1px; }
        .subtitle { font-size: 0.85rem; color: var(--accent); margin-top: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; }
        
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 40px; }
        select, input { background: white; border: 1px solid var(--border); padding: 14px; border-radius: 12px; font-family: inherit; font-size: 1rem; outline: none; box-sizing: border-box; }
        
        .grid-tostadores { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: white; border: 1px solid var(--border); border-radius: 20px; padding: 25px; box-shadow: 0 4px 10px rgba(0,0,0,0.02); display: flex; flex-direction: column; transition: all 0.2s; }
        .card:hover { transform: translateY(-3px); border-color: var(--accent); }
        
        .brand-name { font-size: 1.3rem; font-weight: 800; margin: 0; color: var(--text); }
        .location { font-size: 0.8rem; color: var(--accent); font-weight: 700; margin: 5px 0 20px; text-transform: uppercase; letter-spacing: 1px; }
        
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: auto; }
        .btn { display: block; text-decoration: none; font-size: 0.75rem; font-weight: 700; color: white; text-align: center; padding: 12px; border-radius: 10px; text-transform: uppercase; }
        .btn-ig { background: #475569; }
        .btn-shop { background: var(--accent); }
        .btn:hover { opacity: 0.9; }

        @media (max-width: 600px) { .controls { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <h1>Tostadores Argentinos</h1>
    <p class="subtitle" id="contador">Sincronizando base de datos...</p>
</header>

<div class="container">
    <div class="controls">
        <select id="select-ciudad" onchange="filtrar()"><option value="Todas">Todas las ciudades</option></select>
        <input type="text" id="buscador" placeholder="Buscar marca..." onkeyup="filtrar()">
    </div>
    <div id="grid" class="grid-tostadores"></div>
</div>

<script>
    const SHEET_URL = "https://docs.google.com/spreadsheets/d/10vUOhRr7IAXlRrkBphxEP4ApXYBgrnuxJq6G83GnfHI/gviz/tq?tqx=out:csv&gid=1590442133";

    let tostadores = [];

    async function cargar() {
        // Añadimos un timestamp para forzar a que no use caché vieja
        const urlFinal = `${SHEET_URL}&cache=${new Date().getTime()}`;

        Papa.parse(urlFinal, {
            download: true,
            header: true,
            complete: (results) => {
                // LIMPIEZA DE DATOS AGRESIVA
                tostadores = results.data.map(row => {
                    let cleanRow = {};
                    Object.keys(row).forEach(key => {
                        // Limpiamos el nombre de la columna de cualquier caracter raro
                        let cleanKey = key.trim().toUpperCase();
                        cleanRow[cleanKey] = row[key] ? row[key].trim() : "";
                    });
                    return cleanRow;
                }).filter(t => t.TOSTADOR);

                armarMenu();
                render(tostadores);
                document.getElementById('contador').innerText = `${tostadores.length} Tostadores Federales`;
            }
        });
    }

    function armarMenu() {
        const select = document.getElementById('select-ciudad');
        const ciudades = [...new Set(tostadores.map(t => t.UBICACION || 'Argentina'))].sort();
        ciudades.forEach(ciu => {
            const cant = tostadores.filter(t => (t.UBICACION || 'Argentina') === ciu).length;
            const opt = document.createElement('option');
            opt.value = ciu; opt.textContent = `${ciu} (${cant})`;
            select.appendChild(opt);
        });
    }

    function render(lista) {
        const grid = document.getElementById('grid');
        grid.innerHTML = "";

        lista.forEach(t => {
            const card = document.createElement('div');
            card.className = 'card';
            
            // BUSQUEDA MANUAL DE LINKS PARA EVITAR ERRORES DE COLUMNA
            // Buscamos cualquier columna que contenga "WEB" o "TIENDA"
            let linkShop = "#";
            Object.keys(t).forEach(k => {
                if(k.includes("WEB") || k.includes("TIENDA")) {
                    if(t[k].startsWith("http")) linkShop = t[k];
                }
            });

            const linkIg = t.INSTAGRAM || "#";

            card.innerHTML = `
                <div class="location">📍 ${t.UBICACION || 'Argentina'}</div>
                <h3 class="brand-name">${t.TOSTADOR}</h3>
                <div style="height:25px"></div>
                <div class="btn-group">
                    <a href="${linkIg}" target="_blank" class="btn btn-ig">Instagram</a>
                    <a href="${linkShop}" target="_blank" class="btn btn-shop" ${linkShop === "#" ? "style='display:none'" : ""}>Tienda</a>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function filtrar() {
        const ciu = document.getElementById('select-ciudad').value;
        const bus = document.getElementById('buscador').value.toLowerCase();
        const filtrados = tostadores.filter(t => {
            const ubi = t.UBICACION || 'Argentina';
            return (ciu === "Todas" || ubi === ciu) && t.TOSTADOR.toLowerCase().includes(bus);
        });
        render(filtrados);
    }

    cargar();
</script>
</body>
</html>
