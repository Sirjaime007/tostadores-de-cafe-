<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tostadores Argentinos | Selección Boutique</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <style>
        :root { --bg: #FDFCFB; --text: #2D2421; --accent: #6F4E37; --border: #E8E2DF; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 0; }
        header { padding: 50px 20px; text-align: center; border-bottom: 1px solid var(--border); background: white; }
        h1 { font-size: 2rem; font-weight: 800; margin: 0; }
        .subtitle { font-size: 0.9rem; color: var(--accent); margin-top: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 40px; }
        select, input { background: white; border: 1px solid var(--border); padding: 14px; border-radius: 12px; font-family: inherit; outline: none; }
        .grid-tostadores { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .card { background: white; border: 1px solid var(--border); border-radius: 20px; padding: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.02); display: flex; flex-direction: column; transition: transform 0.2s; }
        .card:hover { transform: translateY(-3px); border-color: var(--accent); }
        .brand-name { font-size: 1.3rem; font-weight: 800; margin: 0; }
        .location { font-size: 0.8rem; color: var(--accent); font-weight: 700; margin: 5px 0 20px; text-transform: uppercase; }
        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: auto; }
        .btn { text-decoration: none; font-size: 0.75rem; font-weight: 700; color: var(--text); text-align: center; padding: 12px; border-radius: 10px; border: 1px solid var(--border); text-transform: uppercase; cursor: pointer; }
        .btn:hover { background: var(--accent); color: white; border-color: var(--accent); }
        .btn-preview { grid-column: span 2; background: var(--text); color: white; border: none; margin-top: 5px; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; padding: 20px; box-sizing: border-box; }
        .modal-content { background: white; width: 100%; height: 100%; border-radius: 15px; overflow: hidden; position: relative; }
        .close-modal { position: absolute; top: 15px; right: 15px; background: var(--accent); color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; z-index: 1001; font-weight: bold; }
        iframe { width: 100%; height: 100%; border: none; }
        @media (max-width: 600px) { .controls { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <h1>Tostadores Argentinos</h1>
    <p class="subtitle" id="contador">Actualizando Colección...</p>
</header>

<div class="container">
    <div class="controls">
        <select id="select-ciudad" onchange="filtrar()"><option value="Todas">Todas las ciudades</option></select>
        <input type="text" id="buscador" placeholder="Buscar marca..." onkeyup="filtrar()">
    </div>
    <div class="grid-tostadores" id="grid"></div>
</div>

<div id="previewModal" class="modal">
    <div class="modal-content"><button class="close-modal" onclick="cerrarPreview()">CERRAR</button><iframe id="previewFrame"></iframe></div>
</div>

<script>
    const SHEET_ID = "10vUOhRr7IAXlRrkBphxEP4ApXYBgrnuxJq6G83GnfHI";
    const GID = "1590442133";
    const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${GID}&v=${new Date().getTime()}`;

    let tostadores = [];

    async function cargar() {
        Papa.parse(URL, {
            download: true, header: true,
            complete: (results) => {
                // Limpiamos los nombres de las columnas para evitar problemas con la "/"
                tostadores = results.data.map(row => {
                    let newRow = {};
                    for (let key in row) {
                        newRow[key.trim().toUpperCase()] = row[key];
                    }
                    return newRow;
                }).filter(f => f.TOSTADOR);
                
                armarMenu();
                render(tostadores);
                document.getElementById('contador').innerText = `${tostadores.length} Marcas Curadas`;
            }
        });
    }

    function armarMenu() {
        const select = document.getElementById('select-ciudad');
        const ciudades = [...new Set(tostadores.map(t => t.UBICACION || 'Argentina'))].sort();
        ciudades.forEach(ciu => {
            const cant = tostadores.filter(t => (t.UBICACION || 'Argentina') === ciu).length;
            const opt = document.createElement('option');
            opt.value = ciu; opt.textContent = `${ciu} (${cant})`;
            select.appendChild(opt);
        });
    }

    function render(lista) {
        const grid = document.getElementById('grid');
        grid.innerHTML = "";
        lista.forEach(t => {
            const card = document.createElement('div');
            card.className = 'card';
            // Buscamos el link sin importar si la columna se llama WEB o WEB/TIENDA
            const link = t['WEB/TIENDA'] || t['WEB'] || t['TIENDA'] || "";
            const ig = t['INSTAGRAM'] || "#";

            card.innerHTML = `
                <div class="location">📍 ${t.UBICACION || 'Argentina'}</div>
                <h3 class="brand-name">${t.TOSTADOR}</h3>
                <div style="height:20px"></div>
                <div class="btn-group">
                    <a href="${ig}" target="_blank" class="btn">Instagram</a>
                    <a href="${link}" target="_blank" class="btn">Tienda</a>
                    <button class="btn btn-preview" onclick="abrirPreview('${link}')">Vista Previa</button>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function abrirPreview(url) {
        if(!url || url === "#" || url.length < 5) return alert("Este tostador no tiene link de tienda cargado en el Excel.");
        document.getElementById('previewFrame').src = url;
        document.getElementById('previewModal').style.display = 'block';
    }

    function cerrarPreview() {
        document.getElementById('previewModal').style.display = 'none';
        document.getElementById('previewFrame').src = "";
    }

    function filtrar() {
        const ciu = document.getElementById('select-ciudad').value;
        const bus = document.getElementById('buscador').value.toLowerCase();
        const filtrados = tostadores.filter(t => {
            const ubi = t.UBICACION || 'Argentina';
            return (ciu === "Todas" || ubi === ciu) && t.TOSTADOR.toLowerCase().includes(bus);
        });
        render(filtrados);
    }

    cargar();
</script>
</body>
</html>
